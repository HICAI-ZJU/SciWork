<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560">
  <!-- ============================================================
       SciWork 背景母题元素库 v1 — Claude Fable 5 手绘矢量
       八个可复用元素，与 IP「求是学者」同源造型语言。
       用法：拷贝对应 <g id="..."> 进背景 SVG，或整文件 <use> 引用。
       深色底用 light 透明度（0.05~0.12），浅色底用 token 色（0.03~0.06）。
       本预览图以中性灰纸为底，元素按标准浓度展示。
       ============================================================ -->
  <rect width="880" height="560" fill="#f3f5f2"/>
  <text x="24" y="40" font-family="Microsoft YaHei" font-size="18" font-weight="700" fill="#063a75">SciWork 背景母题元素库 · Claude v1</text>
  <text x="24" y="62" font-family="Microsoft YaHei" font-size="11" fill="#65718a">中国风 × AI × Science · 与「求是学者」IP 同源 · 浙大蓝 / 求是红 / 玉绿</text>

  <!-- 1. 求是方印（中国风/品牌） -->
  <g id="motif-qiushi-seal" transform="translate(60,110)">
    <rect width="64" height="64" rx="10" fill="#b01f24"/>
    <rect x="9" y="9" width="46" height="46" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="3.5"/>
    <rect x="18" y="18" width="11" height="11" fill="#ffffff" opacity="0.9"/>
    <rect x="36" y="18" width="11" height="11" fill="#ffffff" opacity="0.55"/>
    <rect x="18" y="36" width="11" height="11" fill="#ffffff" opacity="0.55"/>
    <rect x="36" y="36" width="11" height="11" fill="#ffffff" opacity="0.9"/>
  </g>
  <text x="60" y="200" font-family="Microsoft YaHei" font-size="11" fill="#50647d">1 求是方印</text>

  <!-- 2. 印章落款条（中国风装饰边） -->
  <g id="motif-seal-line" transform="translate(204,104)">
    <rect x="0" y="0" width="22" height="22" rx="4" fill="#b01f24"/>
    <rect x="3.5" y="3.5" width="15" height="15" rx="2.5" fill="none" stroke="#ffffff" stroke-opacity="0.8" stroke-width="1.6"/>
    <line x1="11" y1="34" x2="11" y2="86" stroke="#b01f24" stroke-width="2.4" stroke-opacity="0.55"/>
    <line x1="11" y1="92" x2="11" y2="104" stroke="#b01f24" stroke-width="2.4" stroke-opacity="0.3"/>
  </g>
  <text x="186" y="200" font-family="Microsoft YaHei" font-size="11" fill="#50647d">2 印章落款条</text>

  <!-- 3. 回纹角框（中国风边角） -->
  <g id="motif-huiwen-corner" transform="translate(310,108)" fill="none" stroke="#063a75" stroke-width="3" stroke-opacity="0.65">
    <path d="M0 64 L 0 0 L 64 0"/>
    <path d="M12 64 L 12 12 L 64 12"/>
    <path d="M24 40 L 24 24 L 40 24"/>
  </g>
  <text x="310" y="200" font-family="Microsoft YaHei" font-size="11" fill="#50647d">3 回纹角框</text>

  <!-- 4. 水墨山影（中国风底景，双层） -->
  <g id="motif-ink-mountain" transform="translate(430,118)">
    <path d="M0 56 Q 30 18 62 44 T 124 40 T 180 54 L 180 72 L 0 72 Z" fill="#0a4076" fill-opacity="0.35"/>
    <path d="M0 66 Q 44 38 92 56 T 180 62 L 180 72 L 0 72 Z" fill="#021629" fill-opacity="0.5"/>
  </g>
  <text x="430" y="200" font-family="Microsoft YaHei" font-size="11" fill="#50647d">4 水墨山影</text>

  <!-- 5. 知识图谱星座簇（AI） -->
  <g id="motif-constellation" transform="translate(672,96)">
    <g stroke="#005bac" stroke-opacity="0.4" stroke-width="1.6" fill="none">
      <path d="M10 70 L 52 22 L 104 44 L 150 14"/>
      <path d="M52 22 L 74 78 L 130 92"/>
      <path d="M104 44 L 130 92"/>
    </g>
    <g fill="#005bac">
      <circle cx="10" cy="70" r="4" fill-opacity="0.55"/>
      <circle cx="52" cy="22" r="5" fill-opacity="0.7"/>
      <circle cx="104" cy="44" r="4.4" fill-opacity="0.6"/>
      <circle cx="150" cy="14" r="3.6" fill-opacity="0.5"/>
      <circle cx="74" cy="78" r="4" fill-opacity="0.55"/>
    </g>
    <circle cx="130" cy="92" r="5.4" fill="#1d8a78" fill-opacity="0.8"/>
    <circle cx="130" cy="92" r="11" fill="none" stroke="#1d8a78" stroke-opacity="0.35" stroke-width="1.6"/>
  </g>
  <text x="672" y="200" font-family="Microsoft YaHei" font-size="11" fill="#50647d">5 图谱星座簇（玉绿锚点）</text>

  <!-- 6. 分子六环（Science） -->
  <g id="motif-molecule-hex" transform="translate(78,272)">
    <g stroke="#005bac" stroke-opacity="0.55" stroke-width="2.4" fill="none">
      <path d="M52 0 L 104 30 L 104 90 L 52 120 L 0 90 L 0 30 Z"/>
      <path d="M104 60 L 146 84"/>
      <path d="M52 120 L 52 156"/>
    </g>
    <circle cx="146" cy="84" r="7" fill="#1d8a78" fill-opacity="0.75"/>
    <circle cx="52" cy="156" r="6" fill="#b01f24" fill-opacity="0.6"/>
    <circle cx="52" cy="0" r="5" fill="#005bac" fill-opacity="0.6"/>
  </g>
  <text x="78" y="470" font-family="Microsoft YaHei" font-size="11" fill="#50647d">6 分子六环</text>

  <!-- 7. 烧瓶图谱（Science×AI：瓶中升起知识气泡） -->
  <g id="motif-flask-graph" transform="translate(310,268)">
    <path d="M48 0 L 48 52 L 8 132 Q 0 150 18 158 L 102 158 Q 120 150 112 132 L 72 52 L 72 0"
          fill="none" stroke="#063a75" stroke-opacity="0.6" stroke-width="3.4" stroke-linejoin="round"/>
    <path d="M40 0 L 80 0" stroke="#063a75" stroke-opacity="0.6" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M22 124 Q 60 108 98 124 L 106 140 Q 110 152 100 152 L 20 152 Q 10 152 14 140 Z"
          fill="#005bac" fill-opacity="0.18"/>
    <g stroke="#1d8a78" stroke-opacity="0.5" stroke-width="1.8" fill="none">
      <path d="M60 96 L 44 64 L 66 38"/>
      <path d="M44 64 L 76 70"/>
    </g>
    <circle cx="60" cy="96" r="4.4" fill="#1d8a78" fill-opacity="0.75"/>
    <circle cx="44" cy="64" r="4" fill="#1d8a78" fill-opacity="0.6"/>
    <circle cx="66" cy="38" r="3.6" fill="#35b39e" fill-opacity="0.7"/>
    <circle cx="76" cy="70" r="3.2" fill="#005bac" fill-opacity="0.5"/>
  </g>
  <text x="310" y="470" font-family="Microsoft YaHei" font-size="11" fill="#50647d">7 烧瓶图谱</text>

  <!-- 8. 原子轨道（Science/AI 通用记号，IP 同款） -->
  <g id="motif-atom-orbit" transform="translate(560,330)">
    <ellipse rx="58" ry="21" fill="none" stroke="#1d8a78" stroke-opacity="0.6" stroke-width="2.6" transform="rotate(-24)"/>
    <ellipse rx="58" ry="21" fill="none" stroke="#1d8a78" stroke-opacity="0.35" stroke-width="2" transform="rotate(36)"/>
    <ellipse rx="58" ry="21" fill="none" stroke="#005bac" stroke-opacity="0.25" stroke-width="1.8" transform="rotate(96)"/>
    <circle r="7.6" fill="#1d8a78" fill-opacity="0.85"/>
    <circle cx="48" cy="-22" r="4.6" fill="#35b39e" fill-opacity="0.9"/>
    <circle cx="-44" cy="26" r="3.8" fill="#005bac" fill-opacity="0.6"/>
  </g>
  <text x="508" y="470" font-family="Microsoft YaHei" font-size="11" fill="#50647d">8 原子轨道（IP 同款）</text>

  <!-- 组合示例：印章 + 山影 + 星座的角部排布 -->
  <g id="motif-composition-demo" transform="translate(700,250)">
    <rect width="150" height="170" rx="10" fill="#04254d"/>
    <g transform="translate(10,116) scale(0.78)">
      <path d="M0 56 Q 30 18 62 44 T 124 40 T 180 54 L 180 72 L 0 72 Z" fill="#cfe3f7" fill-opacity="0.08"/>
      <path d="M0 66 Q 44 38 92 56 T 180 62 L 180 72 L 0 72 Z" fill="#021629" fill-opacity="0.6"/>
    </g>
    <g transform="translate(16,16) scale(0.55)" stroke="#cfe3f7" stroke-opacity="0.16" stroke-width="2" fill="none">
      <path d="M10 70 L 52 22 L 104 44 L 150 14"/>
      <path d="M52 22 L 74 78"/>
    </g>
    <g fill="#cfe3f7" transform="translate(16,16) scale(0.55)">
      <circle cx="10" cy="70" r="4" fill-opacity="0.25"/>
      <circle cx="52" cy="22" r="5" fill-opacity="0.3"/>
      <circle cx="104" cy="44" r="4.4" fill-opacity="0.25"/>
      <circle cx="150" cy="14" r="3.6" fill-opacity="0.2"/>
    </g>
    <g transform="translate(112,128) scale(0.45)">
      <rect width="64" height="64" rx="10" fill="#b01f24" fill-opacity="0.9"/>
      <rect x="9" y="9" width="46" height="46" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.8" stroke-width="3.5"/>
    </g>
    <text x="14" y="160" font-family="Microsoft YaHei" font-size="9" fill="#cfe3f7" fill-opacity="0.7">深色底组合示例</text>
  </g>
</svg>
