<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- ============================================================
       SciWork IP「求是学者 · 图谱化身」 v1 — Claude Fable 5 手绘矢量
       设计语言：极简平面 / 强剪影 / 产品 token 配色
       色板：浙大蓝 #005bac · 深蓝 #0a3e74/#04254d · 求是红 #b01f24
             玉绿 #1d8a78/#35b39e · 纸面 #fcfcfa · 墨 #20242c
       符号：眼镜=图谱节点+边；镜腿延伸=知识进入头脑；
             白霜发=资深；立领+方印=中国风；原子=Science
       ============================================================ -->
  <defs>
    <radialGradient id="bgDeep" cx="0.5" cy="0.38" r="0.75">
      <stop offset="0" stop-color="#0a4076"/>
      <stop offset="0.7" stop-color="#052a54"/>
      <stop offset="1" stop-color="#031a38"/>
    </radialGradient>
    <clipPath id="disc">
      <circle cx="256" cy="256" r="240"/>
    </clipPath>
  </defs>

  <!-- 背景圆盘：深浙大蓝 + 微星座 + 山影 -->
  <g clip-path="url(#disc)">
    <circle cx="256" cy="256" r="240" fill="url(#bgDeep)"/>
    <g stroke="#cfe3f7" stroke-opacity="0.10" stroke-width="1.2" fill="none">
      <path d="M84 132 L 142 108 L 196 138"/>
      <path d="M388 332 L 432 300"/>
    </g>
    <g fill="#cfe3f7">
      <circle cx="84" cy="132" r="2.6" fill-opacity="0.35"/>
      <circle cx="142" cy="108" r="2" fill-opacity="0.30"/>
      <circle cx="196" cy="138" r="2.4" fill-opacity="0.25"/>
      <circle cx="430" cy="170" r="2.4" fill-opacity="0.30"/>
      <circle cx="388" cy="332" r="2.2" fill-opacity="0.28"/>
      <circle cx="432" cy="300" r="2.6" fill-opacity="0.32"/>
      <circle cx="70" cy="320" r="2.2" fill-opacity="0.30"/>
    </g>
    <!-- 水墨山影 -->
    <path d="M16 432 Q 96 392 176 420 T 336 414 T 496 430 L 496 512 L 16 512 Z"
          fill="#021629" fill-opacity="0.5"/>
  </g>

  <!-- 玉绿原子（Science 记号，右上肩侧） -->
  <g transform="translate(404,118)">
    <ellipse rx="34" ry="12.5" fill="none" stroke="#35b39e" stroke-opacity="0.85" stroke-width="2"
             transform="rotate(-24)"/>
    <ellipse rx="34" ry="12.5" fill="none" stroke="#35b39e" stroke-opacity="0.5" stroke-width="1.6"
             transform="rotate(36)"/>
    <circle r="4.6" fill="#35b39e"/>
    <circle cx="28" cy="-13" r="3" fill="#9fe0d2"/>
  </g>

  <!-- 身体：白大褂 + 浙大蓝立领 -->
  <g>
    <!-- 大褂主体 -->
    <path d="M104 512 L 118 428 Q 146 374 224 362 L 256 382 L 288 362 Q 366 374 394 428 L 408 512 Z"
          fill="#fcfcfa"/>
    <!-- 大褂暗部 -->
    <path d="M328 376 Q 372 388 394 428 L 408 512 L 348 512 Q 360 430 328 376 Z"
          fill="#e3e7ec"/>
    <!-- 立领内芯（中式立领，深蓝） -->
    <path d="M224 362 L 256 386 L 288 362 L 288 512 L 224 512 Z" fill="#0a3e74"/>
    <!-- 盘扣（两道短横） -->
    <rect x="244" y="424" width="24" height="4" rx="2" fill="#9cc6ff" opacity="0.85"/>
    <rect x="244" y="452" width="24" height="4" rx="2" fill="#9cc6ff" opacity="0.6"/>
    <!-- 翻领两片（浙大蓝描边） -->
    <path d="M224 362 L 256 386 L 234 440 L 200 396 Z" fill="#ffffff" stroke="#005bac" stroke-width="4" stroke-linejoin="round"/>
    <path d="M288 362 L 256 386 L 278 440 L 312 396 Z" fill="#ffffff" stroke="#005bac" stroke-width="4" stroke-linejoin="round"/>
    <!-- 求是红方印徽 -->
    <g transform="translate(186,432)">
      <rect width="30" height="30" rx="5" fill="#b01f24"/>
      <rect x="4.5" y="4.5" width="21" height="21" rx="3" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2"/>
      <rect x="9" y="9" width="5" height="5" fill="#ffffff" opacity="0.9"/>
      <rect x="18" y="9" width="5" height="5" fill="#ffffff" opacity="0.55"/>
      <rect x="9" y="18" width="5" height="5" fill="#ffffff" opacity="0.55"/>
      <rect x="18" y="18" width="5" height="5" fill="#ffffff" opacity="0.9"/>
    </g>
  </g>

  <!-- 头部（大头比例） -->
  <g>
    <!-- 耳 -->
    <circle cx="134" cy="234" r="20" fill="#f4dcc2"/>
    <circle cx="378" cy="234" r="20" fill="#f4dcc2"/>
    <!-- 脸 -->
    <ellipse cx="256" cy="228" rx="120" ry="112" fill="#f6e2ca"/>
    <!-- 右侧颊一弯浅影（克制的体积感） -->
    <path d="M330 160 Q 376 226 330 312 Q 364 258 352 196 Z" fill="#ecc9a8" opacity="0.45"/>
    <!-- 黑发 + 三缕白霜 -->
    <path d="M136 232 Q 124 116 226 94 Q 256 88 286 94 Q 388 116 376 232
             Q 372 178 344 156 Q 348 178 338 196 Q 326 150 286 136 Q 296 158 290 174
             Q 262 132 212 140 Q 222 158 216 176 Q 188 148 166 168 Q 172 192 164 210 Q 148 198 136 232 Z"
          fill="#20242c"/>
    <path d="M196 110 Q 218 100 240 100 Q 220 112 210 128 Q 202 118 196 110 Z" fill="#e9edf2" opacity="0.92"/>
    <path d="M290 102 Q 312 106 330 118 Q 312 122 300 134 Q 296 116 290 102 Z" fill="#e9edf2" opacity="0.8"/>
    <path d="M152 158 Q 162 148 176 144 Q 166 160 164 176 Q 156 166 152 158 Z" fill="#e9edf2" opacity="0.7"/>

    <!-- 眉（温和粗短） -->
    <path d="M178 196 Q 204 186 226 194" fill="none" stroke="#20242c" stroke-width="9" stroke-linecap="round"/>
    <path d="M286 194 Q 308 186 334 196" fill="none" stroke="#20242c" stroke-width="9" stroke-linecap="round"/>

    <!-- 眼镜 = 图谱：两节点一桥边，右腿延伸为边连向外部节点 -->
    <g fill="none" stroke="#1b2839" stroke-width="6">
      <circle cx="208" cy="238" r="33"/>
      <circle cx="304" cy="238" r="33"/>
      <path d="M241 236 L 271 236"/>
      <path d="M175 234 L 150 228"/>
      <path d="M337 234 L 372 226"/>
    </g>
    <!-- 镜腿延伸的图谱边与节点（知识进入头脑） -->
    <g>
      <path d="M372 226 L 412 206" fill="none" stroke="#2b7ec8" stroke-width="3.4" stroke-linecap="round"/>
      <circle cx="412" cy="206" r="7" fill="#2b7ec8"/>
      <path d="M412 206 L 444 226" fill="none" stroke="#35b39e" stroke-width="3" stroke-linecap="round"/>
      <circle cx="444" cy="226" r="5.6" fill="#35b39e"/>
    </g>

    <!-- 眼睛 -->
    <circle cx="208" cy="242" r="7" fill="#20242c"/>
    <circle cx="304" cy="242" r="7" fill="#20242c"/>
    <circle cx="210.5" cy="239.5" r="2.2" fill="#ffffff"/>
    <circle cx="306.5" cy="239.5" r="2.2" fill="#ffffff"/>

    <!-- 鼻 / 嘴 / 山羊胡 -->
    <path d="M256 252 Q 251 268 258 274" fill="none" stroke="#d9ab84" stroke-width="5" stroke-linecap="round"/>
    <path d="M230 296 Q 256 314 282 296" fill="none" stroke="#9c5d49" stroke-width="6" stroke-linecap="round"/>
    <path d="M240 318 Q 256 330 272 318 Q 270 340 256 342 Q 242 340 240 318 Z" fill="#d4d9de"/>

    <!-- 腮红（极淡求是红） -->
    <ellipse cx="172" cy="276" rx="15" ry="9" fill="#b01f24" opacity="0.16"/>
    <ellipse cx="340" cy="276" rx="15" ry="9" fill="#b01f24" opacity="0.16"/>
  </g>
</svg>
