# 空间模板：浙大 iChemFoundry 材料发现空间（占位配置，本体复用 chemistry/v1）
# 真实装置 Profile 与 materials 本体待后续打磨
space: zju-ichemfoundry
displayName: 浙大 iChemFoundry 材料发现空间
institution: 浙江大学科创中心 · 生物与分子智造研究院
domain: MOF 材料的自动化合成与发现
ontology: { space: chemistry, version: v1 }
groupSlug: grp-ichem
subscribedKgs: [Material, MatKG, MEKG, ElementKG]
defaultSkills:
  - scicompass
  - literature-review
  - experiment-design
  - run-and-analyze
  - sci-data-analysis
devices:
  - id: dev-ichemfoundry
    name: iChemFoundry 材料自动化平台
    kind: automated-platform
    physicalAvailable: false
    capabilities:
      - experimentType: mof-synthesis
        parameterSchema:
          type: object
          required: [temperatureC, timeHours]
          properties:
            temperatureC: { type: number, minimum: 20, maximum: 220 }
            timeHours: { type: number, minimum: 0.5, maximum: 96 }
            linker: { type: string }
        constraints: [高温溶剂热需密封反应釜]
    safetyRules: [反应釜压力不得超过额定值, 温度不得超过 220C]
    supportedPolicies: [suggest, draft-protocol, queue-with-approval]
  - id: dev-xrd
    name: 粉末 X 射线衍射仪
    kind: instrument
    physicalAvailable: false
    partOf: dev-ichemfoundry
    capabilities:
      - experimentType: xrd-analysis
        parameterSchema: { type: object, properties: { scanRange: { type: string } } }
        constraints: []
    safetyRules: []
    supportedPolicies: [queue-with-approval]
