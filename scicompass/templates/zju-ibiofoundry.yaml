# 空间模板：浙大 iBioFoundry 合成生物空间（占位配置，本体复用 chemistry/v1）
# 真实装置 Profile 与 synbio 本体待后续打磨
space: zju-ibiofoundry
displayName: 浙大 iBioFoundry 合成生物空间
institution: 浙江大学科创中心 · 生物与分子智造研究院
domain: 合成生物的菌株构建与测试（设计-构建-测试-学习闭环）
ontology: { space: chemistry, version: v1 }
groupSlug: grp-ibio
subscribedKgs: [ProteinKG25, RNA-KG, PPIKG]
defaultSkills:
  - scicompass
  - literature-review
  - experiment-design
  - run-and-analyze
  - sci-data-analysis
devices:
  - id: dev-ibiofoundry
    name: iBioFoundry 合成生物自动化平台
    kind: automated-platform
    physicalAvailable: false
    capabilities:
      - experimentType: strain-build
        parameterSchema:
          type: object
          required: [incubationHours, temperatureC]
          properties:
            temperatureC: { type: number, minimum: 4, maximum: 42 }
            incubationHours: { type: number, minimum: 1, maximum: 168 }
            strain: { type: string }
        constraints: [生物安全等级须匹配菌株]
    safetyRules: [仅限 BSL-1/BSL-2 菌株, 培养温度不得超过 42C]
    supportedPolicies: [suggest, draft-protocol, queue-with-approval]
  - id: dev-platereader
    name: 多功能酶标仪
    kind: instrument
    physicalAvailable: false
    partOf: dev-ibiofoundry
    capabilities:
      - experimentType: plate-reading
        parameterSchema: { type: object, properties: { wavelength: { type: string } } }
        constraints: []
    safetyRules: []
    supportedPolicies: [queue-with-approval]
